<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SVGA 预览插件测试页面</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
      line-height: 1.6;
    }
    h1 {
      color: #333;
    }
    .test-section {
      margin: 30px 0;
      padding: 20px;
      background: #f5f5f5;
      border-radius: 8px;
    }
    a {
      color: #0066cc;
      text-decoration: underline;
      cursor: pointer;
    }
    img {
      max-width: 100px;
      border: 1px solid #ddd;
    }
    .note {
      background: #fff3cd;
      padding: 10px;
      border-left: 4px solid #ffc107;
      margin: 10px 0;
    }
  </style>
</head>
<body>
  <h1>SVGA 预览插件测试页面</h1>

  <div class="note">
    <strong>说明：</strong>将鼠标悬浮在下面的SVGA链接上，应该会看到动画预览。
  </div>

  <div class="test-section">
    <h2>测试1: A标签链接（href）</h2>
    <p>
      <a href="https://cdn.jsdelivr.net/gh/svga/SVGA-Samples@master/angel.svga">angel.svga</a>
      &nbsp;&nbsp;
      <a href="https://cdn.jsdelivr.net/gh/svga/SVGA-Samples@master/rose.svga">rose.svga</a>
    </p>
  </div>

  <div class="test-section">
    <h2>测试2: data-* 属性（你页面中常见的形式）</h2>
    <span data-url="https://cdn.jsdelivr.net/gh/svga/SVGA-Samples@master/angel.svga"
          style="cursor:pointer; color:#0066cc; text-decoration:underline;">
      悬浮我（data-url属性）
    </span>
    <br><br>
    <div data-src="https://cdn.jsdelivr.net/gh/svga/SVGA-Samples@master/rose.svga"
         style="cursor:pointer; display:inline-block; padding:8px; background:#eee; border-radius:4px;">
      悬浮我（data-src属性）
    </div>
  </div>

  <div class="test-section">
    <h2>测试3: 纯文字内容中包含SVGA链接</h2>
    <span style="cursor:pointer; color:#0066cc;">
      https://cdn.jsdelivr.net/gh/svga/SVGA-Samples@master/kingset.svga
    </span>
  </div>

  <div class="test-section">
    <h2>测试4: IMG标签 src</h2>
    <img src="https://cdn.jsdelivr.net/gh/svga/SVGA-Samples@master/angel.svga" alt="SVGA"
         style="width:80px; height:60px; background:#ddd; display:block;">
  </div>
</body>
</html>
